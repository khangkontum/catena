[tools]
uv = "0.11.21"
bun = "1.3.14"

# Secrets and machine-local settings belong in mise.local.toml.
# Run commands through mise so this project uses the tool versions above, e.g.:
#   mise run sync
#   mise run api:init
#   mise run web:dev

[tasks.sync]
description = "Install Python and Bun frontend dependencies"
depends = ["api:sync", "web:install"]

[tasks."api:sync"]
description = "Install Python dependencies"
run = "uv sync"

[tasks."web:install"]
description = "Install Bun frontend dependencies"
dir = "apps/web"
run = "bun install"

[tasks."api:init"]
description = "Initialize local catena storage and run Alembic migrations"
run = "uv run catena init"

[tasks.dev]
description = "Start API and web dev servers in zmx sessions"
run = """
zmx kill catena-api --force >/dev/null 2>&1 || true
zmx kill catena-web --force >/dev/null 2>&1 || true
zmx run catena-api -d mise run api:dev
zmx run catena-web -d mise run web:dev
printf '\nStarted catena dev servers in zmx:\n'
printf '  API:  http://127.0.0.1:8765  (zmx tail catena-api)\n'
printf '  Web:  http://127.0.0.1:3000  (zmx tail catena-web)\n'
printf '\nStop with: mise run dev:stop\n'
printf 'Logs with: mise run dev:tail\n'
"""

[tasks."dev:tail"]
description = "Tail zmx API and web dev server output"
run = "zmx tail catena-api catena-web"

[tasks."dev:stop"]
description = "Stop zmx API and web dev server sessions"
run = """
zmx kill catena-api --force >/dev/null 2>&1 || true
zmx kill catena-web --force >/dev/null 2>&1 || true
printf 'Stopped catena zmx dev sessions.\n'
"""

[tasks."api:dev"]
description = "Run the local FastAPI server"
run = "uv run catena serve --reload"

[tasks."api:serve"]
description = "Run the local FastAPI server without reload"
run = "uv run catena serve"

[tasks."web:dev"]
description = "Run the Next.js frontend with Bun"
dir = "apps/web"
run = "bun run dev"

[tasks."web:build"]
description = "Build the Next.js frontend with Bun"
dir = "apps/web"
run = "bun run build"

[tasks."web:lint"]
description = "Lint the Next.js frontend with Bun"
dir = "apps/web"
run = "bun run lint"

[tasks."web:typecheck"]
description = "Typecheck the Next.js frontend with Bun"
dir = "apps/web"
run = "bun run typecheck"

[tasks."api:lint"]
description = "Lint Python code"
run = "uv run ruff check ."

[tasks."api:test"]
description = "Run Python tests"
run = "uv run pytest"

[tasks.check]
description = "Run Python and frontend validation"
depends = ["api:lint", "api:test", "web:lint", "web:typecheck"]
