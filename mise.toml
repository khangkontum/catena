[tools]
uv = "0.11.21"

# Secrets and machine-local settings belong in mise.local.toml.
# Run commands through mise so this project uses the tool version above, e.g.:
#   mise run sync
#   mise run api:init

[tasks.sync]
description = "Install Python dependencies"
run = "uv sync"

[tasks."api:sync"]
description = "Install Python dependencies"
run = "uv sync"

[tasks."api:init"]
description = "Initialize local catena storage and run Alembic migrations"
run = "uv run catena init"

[tasks."api:lint"]
description = "Lint Python code"
run = "uv run ruff check ."

[tasks."api:test"]
description = "Run Python tests"
run = "uv run pytest"

[tasks.check]
description = "Run Python validation"
depends = ["api:lint", "api:test"]
